<a href="/restaurant/items/{{ object.pk }}/" class="d-block h-100  w-100">
  <div class="border h-100 restaurant-card">
    <img src="/{{ object.image }}" width="100%" class="bg-white restaurant-card-img">
    <div class="bg-light text-center text-secondary overflow-hidden">
      <div class="my-2 py-2">
        <h2 class="lead">{{ object.name }} - ¥{{ object.price }}</h2>
      </div>
    </div>
  </div>
</a>
